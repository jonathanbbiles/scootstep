<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1F3A5F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>ScootSteps</title>
<style>
/* ============================================================
   ScootSteps — a great night out, not a fitness app. (brief §10)
   Warm neon on wood grain · denim + boot leather · a wink of rhinestone.
   ============================================================ */
:root{
  --denim:#1F3A5F; --denim-2:#183050; --denim-3:#122840; --denim-4:#0e2135;
  --amber:#D97B29; --amber-bright:#F2A24E; --amber-deep:#B5631C;
  --cream:#FAF5EC; --cream-dim:#E7DECB;
  --teal:#2BB3A3; --coral:#E4574F; --rhinestone:#EAD8FF;
  --ink:#0d1826;
  --text:#FAF5EC; --muted:rgba(250,245,236,.66); --faint:rgba(250,245,236,.42);
  --line:rgba(250,245,236,.14); --line-2:rgba(250,245,236,.24);
  --card:#22436a; --card-2:#1b3757; --good:#3FBF87;
  --radius:16px; --radius-sm:11px; --tabh:66px; --textScale:1;
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  font-size:calc(16px*var(--textScale));
  background:radial-gradient(130% 90% at 50% -8%, #294f7c 0%, var(--denim) 44%, var(--denim-3) 100%) fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior:none;
}
button{font-family:inherit;cursor:pointer}
.hide{display:none!important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ---- app + views ---- */
#app{min-height:100%;padding-bottom:calc(var(--tabh) + var(--safe-b))}
.view{display:none;padding:calc(var(--safe-t) + 14px) 16px 24px;max-width:560px;margin:0 auto;animation:fade .22s}
.view.is-active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.vhead{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:14px}
.vtitle{font-size:calc(26px*var(--textScale));font-weight:900;letter-spacing:-.4px;line-height:1.05}
.vtitle .amp{color:var(--amber-bright)}
.vsub{color:var(--muted);font-size:calc(13px*var(--textScale));margin-top:3px;font-weight:600}
.iconbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line-2);background:rgba(250,245,236,.06);color:var(--cream);font-size:19px;display:flex;align-items:center;justify-content:center}

/* ---- cards ---- */
.card{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:12px;position:relative;overflow:hidden}
.spotlight{background:linear-gradient(150deg,#2a4d78,#1c3a5c);border:1px solid rgba(217,123,41,.4)}
.spotlight::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 90% -20%, rgba(242,162,78,.22), transparent 60%);pointer-events:none}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--amber-bright)}
.h2{font-size:calc(19px*var(--textScale));font-weight:800;margin:2px 0 4px}
.p{color:var(--muted);font-size:calc(13.5px*var(--textScale));line-height:1.5}

/* ---- buttons ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1px solid var(--line-2);background:rgba(250,245,236,.07);color:var(--cream);font-weight:800;font-size:calc(15px*var(--textScale));padding:14px;border-radius:var(--radius-sm);transition:transform .05s,background .12s}
.btn:active{transform:scale(.975)}
.btn.primary{background:linear-gradient(180deg,var(--amber-bright),var(--amber));border-color:var(--amber-deep);color:#3a1e07;box-shadow:0 8px 20px -8px var(--amber)}
.btn.ghost{background:transparent}
.btn.sm{padding:10px 14px;font-size:calc(13.5px*var(--textScale));width:auto}
.btn.good{background:rgba(63,191,135,.16);border-color:var(--good);color:#a7ecca}
.btn:disabled{opacity:.45}

/* ---- chips / tags ---- */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11.5px;font-weight:800;letter-spacing:.2px;padding:5px 9px;border-radius:999px;background:rgba(250,245,236,.08);border:1px solid var(--line);color:var(--cream)}
.chip.amber{background:rgba(217,123,41,.18);border-color:rgba(217,123,41,.5);color:var(--amber-bright)}
.chip.on{background:var(--amber);border-color:var(--amber-bright);color:#3a1e07}
.prevbtn{flex:0 0 auto;background:rgba(217,123,41,.18);border-color:rgba(217,123,41,.5);color:var(--amber-bright);font-weight:800;padding:9px 13px;cursor:pointer;min-width:96px;text-align:center;transition:background .1s,transform .05s}
.prevbtn:active{transform:scale(.96)}
.prevbtn.playing{background:var(--amber);border-color:var(--amber-bright);color:#3a1e07;box-shadow:0 0 0 3px rgba(217,123,41,.25)}
.prevbtn:disabled{opacity:.5;color:var(--muted);cursor:default}
.boots{color:var(--amber-bright);letter-spacing:1px;font-size:12px}

/* ---- dance cards grid ---- */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dcard{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--line);border-radius:var(--radius);padding:0;overflow:hidden;position:relative;text-align:left}
.dcard .thumb{height:96px;position:relative;background:linear-gradient(160deg,#3a2a1c,#241a10)}
.dcard .thumb canvas{width:100%;height:100%;display:block}
.dcard .body{padding:10px 11px 12px}
.dcard .nm{font-size:calc(14.5px*var(--textScale));font-weight:800;line-height:1.15}
.dcard .meta{color:var(--muted);font-size:11.5px;font-weight:700;margin-top:3px}
.dcard .lock{position:absolute;top:8px;right:8px;background:rgba(13,24,38,.7);border:1px solid var(--line-2);border-radius:999px;padding:3px 8px;font-size:10.5px;font-weight:800;color:var(--amber-bright)}
.dcard .pin{position:absolute;top:8px;left:8px;font-size:12px}
.dcard.wide{grid-column:1 / -1;display:flex;flex-direction:row}
.dcard.wide .thumb{width:130px;height:auto;flex:0 0 130px}
.dcard.wide .body{flex:1}

/* ---- search / filters ---- */
.search{display:flex;align-items:center;gap:9px;background:var(--denim-2);border:1px solid var(--line-2);border-radius:13px;padding:11px 13px;margin-bottom:12px}
.search input{flex:1;background:none;border:0;color:var(--cream);font-size:calc(15px*var(--textScale));outline:none}
.search input::placeholder{color:var(--faint)}
.filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}

/* ---- streak / stat row ---- */
.statrow{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--denim-2);border:1px solid var(--line);border-radius:13px;padding:11px 12px;text-align:center}
.stat b{display:block;font-size:calc(22px*var(--textScale));font-weight:900;color:var(--amber-bright)}
.stat span{font-size:11px;color:var(--muted);font-weight:700}

/* ---- PLAYER (full-screen overlay) ---- */
#player{position:fixed;inset:0;z-index:60;background:radial-gradient(120% 80% at 50% -10%, #294f7c, var(--denim-3) 60%, var(--denim-4));display:none;flex-direction:column;padding:calc(var(--safe-t) + 8px) 12px calc(var(--safe-b) + 12px)}
#player.on{display:flex}
.p-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.p-top .nm{flex:1;min-width:0}
.p-top .nm b{font-size:calc(16px*var(--textScale));font-weight:800;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-top .nm small{color:var(--muted);font-size:11.5px;font-weight:700}
.stage{position:relative;width:100%;flex:0 0 auto;aspect-ratio:1/1;max-height:46vh;border-radius:20px;overflow:hidden;background:#3a2a1c;box-shadow:0 16px 36px -18px #000, inset 0 0 0 1px var(--line);margin:0 auto}
.stage canvas{display:block;width:100%;height:100%}
.compass{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:rgba(13,24,38,.55);backdrop-filter:blur(6px);border:1px solid var(--line-2);font-size:11px;font-weight:800}
.compass .dot{width:8px;height:8px;border-radius:2px;background:var(--amber)}
.phrasetag{position:absolute;top:10px;right:10px;padding:6px 10px;border-radius:999px;background:rgba(13,24,38,.55);border:1px solid var(--line);font-size:11px;font-weight:800;color:var(--amber-bright);max-width:60%;text-align:right}
.cue{position:absolute;left:50%;top:16px;transform:translateX(-50%) translateY(-8px);background:rgba(234,216,255,.18);border:1px solid rgba(234,216,255,.55);color:var(--rhinestone);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:800;white-space:nowrap;opacity:0;transition:.18s;pointer-events:none;text-shadow:0 1px 6px #000}
.cue.show{opacity:1;transform:translateX(-50%) translateY(0)}
.instr{display:flex;align-items:center;gap:12px;background:var(--denim-2);border:1px solid var(--line);border-radius:14px;padding:9px 13px;margin:10px 0}
.cchip{flex:0 0 auto;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:calc(21px*var(--textScale));font-weight:900;color:#3a1e07;background:var(--amber)}
.instr .t b{font-size:calc(15px*var(--textScale))}
.instr .t span{display:block;color:var(--muted);font-size:12px;font-weight:600;margin-top:1px}
.ribbon{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:10px}
.rc{aspect-ratio:1/1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:calc(13px*var(--textScale));font-weight:800;color:var(--muted);background:rgba(250,245,236,.06);border:1px solid transparent}
.rc.b1{color:var(--cream)}.rc.touch{opacity:.7}
.rc.active{background:var(--amber);color:#3a1e07;border-color:var(--amber-bright);transform:scale(1.05)}
.rc.insel{background:rgba(217,123,41,.22)}
#p-sections .sec{padding:10px 13px;font-size:calc(13.5px*var(--textScale));flex:0 0 auto}
.pcontrols{margin-top:auto;display:flex;flex-direction:column;gap:9px}
.prow{display:flex;gap:8px}
.pbtn{flex:1;border:1px solid var(--line-2);background:rgba(250,245,236,.07);color:var(--cream);font-weight:800;font-size:calc(14px*var(--textScale));padding:13px 8px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:6px}
.pbtn:active{transform:scale(.97)}
.pbtn.primary{background:var(--amber);border-color:var(--amber-bright);color:#3a1e07;flex:1.5}
.pbtn.on{background:rgba(43,179,163,.2);border-color:var(--teal);color:#8fe6da}
.pbtn:disabled{opacity:.4}
.tempo{background:var(--denim-2);border:1px solid var(--line);border-radius:13px;padding:10px 14px}
.tempo-h{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:800;color:var(--muted)}
.tempo-h b{color:var(--amber-bright);font-size:calc(15px*var(--textScale))}
input[type=range]{width:100%;margin-top:7px;accent-color:var(--amber);height:26px}
.seg{display:flex;background:var(--denim-3);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;border:0;background:none;color:var(--muted);font-weight:800;font-size:calc(13px*var(--textScale));padding:8px;border-radius:8px}
.seg button.on{background:var(--amber);color:#3a1e07}

/* ---- tab bar ---- */
.tabbar{position:fixed;left:0;right:0;bottom:0;height:calc(var(--tabh) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(15,29,48,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;z-index:40}
.tab{flex:1;border:0;background:none;color:var(--faint);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10.5px;font-weight:800}
.tab .ic{font-size:20px;line-height:1}
.tab.on{color:var(--amber-bright)}

/* ---- overlays: onboarding + paywall ---- */
.overlay{position:fixed;inset:0;z-index:80;background:radial-gradient(120% 80% at 50% -10%, #294f7c, var(--denim-3) 55%, var(--denim-4));display:none;flex-direction:column;padding:calc(var(--safe-t) + 24px) 22px calc(var(--safe-b) + 22px);overflow-y:auto}
.overlay.on{display:flex}
.ob-choice{background:linear-gradient(150deg,var(--card),var(--card-2));border:1px solid var(--line-2);border-radius:var(--radius);padding:18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;text-align:left;width:100%}
.ob-choice .em{font-size:30px}
.ob-choice b{font-size:calc(17px*var(--textScale));font-weight:800;display:block}
.ob-choice span{color:var(--muted);font-size:calc(13px*var(--textScale));font-weight:600}
.ob-choice.sel{border-color:var(--amber);background:linear-gradient(150deg,#2a4d78,#1c3a5c)}
.paywall-feat{display:flex;align-items:flex-start;gap:11px;margin-bottom:13px}
.paywall-feat .k{color:var(--good);font-size:18px;flex:0 0 auto;margin-top:1px}
.paywall-feat b{font-weight:800}
.paywall-feat span{display:block;color:var(--muted);font-size:calc(13px*var(--textScale))}
.price-opt{border:1px solid var(--line-2);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.price-opt.best{border-color:var(--amber);background:rgba(217,123,41,.1)}
.price-opt b{font-size:calc(16px*var(--textScale))}
.price-opt small{color:var(--muted);font-size:12px;display:block}

/* ---- toast + celebrate ---- */
#toast{position:fixed;left:50%;bottom:calc(var(--tabh) + var(--safe-b) + 16px);transform:translateX(-50%) translateY(20px);background:var(--ink);border:1px solid var(--line-2);color:var(--cream);padding:11px 16px;border-radius:999px;font-weight:700;font-size:13.5px;z-index:100;opacity:0;transition:.25s;pointer-events:none;max-width:88%}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#celebrate{position:fixed;inset:0;z-index:120;pointer-events:none;display:none}
#celebrate.on{display:block}
/* accessibility: honor reduced motion (brief §9) */
@media (prefers-reduced-motion: reduce){ .view{animation:none} #celebrate{display:none!important} *{scroll-behavior:auto!important} }
/* focus visibility for keyboard/switch control */
button:focus-visible,input:focus-visible,a:focus-visible{outline:3px solid var(--amber-bright);outline-offset:2px}
</style>
</head>
<body>
<div id="app">
  <h1 class="sr-only">ScootSteps — learn to line dance with animated footwork</h1>
  <!-- HOME / TONIGHT -->
  <section id="view-home" class="view" aria-label="Tonight"></section>
  <!-- LIBRARY -->
  <section id="view-library" class="view" aria-label="Library">
    <div class="vhead"><div><div class="vtitle">Library</div><div class="vsub" id="lib-count">40 dances and counting</div></div></div>
    <div class="search"><span aria-hidden="true">🔎</span><input id="lib-search" type="search" placeholder="Search a dance — try “cupid” or “wobble”" aria-label="Search dances" autocomplete="off" autocorrect="off" /></div>
    <div class="filters" id="lib-filters"></div>
    <div class="grid" id="lib-grid"></div>
    <div id="lib-empty" class="p hide" style="text-align:center;padding:26px 0"></div>
  </section>
  <!-- GLOSSARY -->
  <section id="view-glossary" class="view" aria-label="Glossary">
    <div class="vhead"><div><div class="vtitle">The Basics</div><div class="vsub">Every move, broken down. Tap to watch it slow.</div></div></div>
    <div class="search"><span aria-hidden="true">🔎</span><input id="glo-search" type="search" placeholder="Search a step — “grapevine”, “jazz box”…" aria-label="Search glossary" autocomplete="off" /></div>
    <div class="grid" id="glo-grid"></div>
  </section>
  <!-- MY DANCES -->
  <section id="view-mydances" class="view" aria-label="My Dances"></section>
  <!-- DANCE DETAIL -->
  <section id="view-detail" class="view" aria-label="Dance detail"></section>
  <!-- SETTINGS -->
  <section id="view-settings" class="view" aria-label="Settings"></section>
</div>

<!-- PLAYER OVERLAY -->
<div id="player" role="dialog" aria-label="Dance player">
  <div class="p-top">
    <button class="iconbtn" id="p-close" aria-label="Close player">✕</button>
    <div class="nm"><b id="p-name">Dance</b><small id="p-credit"></small></div>
    <div class="seg" style="flex:0 0 auto"><button id="p-mode-watch" class="on">Watch</button><button id="p-mode-learn">Learn</button></div>
  </div>
  <div class="stage">
    <canvas id="p-canvas" role="img" aria-label="Top-down animation of two boots showing the current step"></canvas>
    <div class="compass"><span class="dot" id="p-walldot"></span><span id="p-wall">Front wall</span></div>
    <div class="phrasetag" id="p-phrase"></div>
    <div class="cue" id="p-cue"></div>
  </div>
  <div class="instr" aria-live="polite"><div class="cchip" id="p-count" aria-label="Current count">1</div><div class="t"><b id="p-instr">Ready</b><span id="p-instr2">Press play — the count track keeps you on beat</span></div></div>
  <div class="ribbon" id="p-ribbon"></div>
  <div class="pcontrols" id="p-controls">
    <!-- WATCH: the whole dance -->
    <div id="ctl-watch">
      <div class="prow">
        <button class="pbtn primary" id="p-play">▶ Play</button>
        <button class="pbtn" id="p-restart" aria-label="Restart from the top">↺</button>
        <button class="pbtn" id="p-mirror" aria-label="Mirror the view">🪞 Mirror</button>
      </div>
      <div class="prow" style="margin-top:9px">
        <button class="pbtn on" id="p-loop-watch">🔁 Loop dance: On</button>
        <button class="pbtn" id="p-rotate" aria-label="Play through all walls once">🧭 All walls</button>
      </div>
    </div>
    <!-- LEARN / DRILL: pick a section -->
    <div id="ctl-learn" class="hide">
      <div id="p-sections" class="filters" style="margin-bottom:10px" role="group" aria-label="Pick a section to drill"></div>
      <div class="prow" style="margin-bottom:9px">
        <button class="pbtn" id="p-prev" aria-label="Previous count">‹ Step</button>
        <button class="pbtn primary" id="p-step-play">▶ Play section</button>
        <button class="pbtn" id="p-next" aria-label="Next count">Step ›</button>
      </div>
      <div class="prow">
        <button class="pbtn on" id="p-loop">🔁 Loop: On</button>
        <button class="pbtn on" id="p-ghost">👣 Ghost: On</button>
      </div>
    </div>
    <!-- shared tempo (both modes) -->
    <div class="tempo" style="margin-top:10px">
      <div class="tempo-h"><span>Tempo</span><b id="p-tempoval">100%</b></div>
      <input type="range" id="p-tempo" min="40" max="120" step="5" value="100" aria-label="Tempo" />
      <div class="tempo-h" style="margin-top:5px"><span id="p-bpm">96 BPM</span><span id="p-tempolock" class="hide">Pro unlocks 40–120%</span></div>
    </div>
  </div>
</div>

<!-- ONBOARDING OVERLAY -->
<div id="onboarding" class="overlay" role="dialog" aria-label="Welcome"></div>
<!-- PAYWALL OVERLAY -->
<div id="paywall" class="overlay" role="dialog" aria-label="ScootSteps Pro"></div>

<div id="toast" role="status" aria-live="polite"></div>
<canvas id="celebrate"></canvas>

<!-- TAB BAR -->
<nav class="tabbar" role="tablist" aria-label="Main">
  <button class="tab on" data-view="home" role="tab"><span class="ic" aria-hidden="true">🏠</span><span>Tonight</span></button>
  <button class="tab" data-view="library" role="tab"><span class="ic" aria-hidden="true">💃</span><span>Library</span></button>
  <button class="tab" data-view="glossary" role="tab"><span class="ic" aria-hidden="true">👣</span><span>Basics</span></button>
  <button class="tab" data-view="mydances" role="tab"><span class="ic" aria-hidden="true">⭐</span><span>My Dances</span></button>
</nav>

<script src="js/engine.js"></script>
<script src="js/data.dances.js"></script>
<script src="js/data.glossary.js"></script>
<script src="js/iap.js"></script>
<script src="js/app.js"></script>
</body>
</html>
